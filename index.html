<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兑换码领取</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #333; margin-bottom: 30px; }
    .input-group { margin-bottom: 20px; }
    label { display: block; color: #555; margin-bottom: 8px; font-weight: 500; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 16px; border-radius: 10px; text-align: center; display: none; }
    .result.success { background: #d4edda; color: #155724; }
    .result.error { background: #f8d7da; color: #721c24; }
    .result code { display: block; font-size: 24px; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎁 兑换码领取</h1>
    <div class="input-group">
      <label>请输入您的密钥</label>
      <input type="text" id="key" placeholder="输入密钥后点击领取" />
    </div>
    <button onclick="exchange()" id="btn">立即领取</button>
    <div class="result" id="result"></div>
  </div>
  <script>
    const API_URL = '/api/exchange';
    async function exchange() {
      const key = document.getElementById('key').value.trim();
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      if (!key) { showResult('请输入密钥', 'error'); return; }
      btn.disabled = true;
      try {
        const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
        const data = await res.json();
        if (data.success) {
          showResult('兑换成功！您的兑换码：', 'success');
          document.getElementById('result').innerHTML += '<code>' + data.code + '</code>';
        } else { showResult(data.message || '领取失败', 'error'); }
      } catch (e) { showResult('网络错误', 'error'); }
      btn.disabled = false;
    }
    function showResult(msg, type) {
      const r = document.getElementById('result');
      r.textContent = msg; r.className = 'result ' + type; r.style.display = 'block';
    }
  </script>
</body>
</html>
